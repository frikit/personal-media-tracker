<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watchlist Tracker</title>
    <link href="fonts/fonts.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
<div class="grain"></div>
<div class="c">
    <header>
        <h1>Watchlist <span>Tracker</span></h1>
        <p>Fork this repo, tick what you've watched, then <code>Save changes</code> and commit the updated JSON files. Hover titles for poster previews.</p>
    </header>
    <div class="stats">
        <div class="st">
            <div class="sn" id="s-total">0</div>
            <div class="sl">Total</div>
        </div>
        <div class="st">
            <div class="sn green" id="s-watched">0</div>
            <div class="sl">Watched</div>
        </div>
        <div class="st">
            <div class="sn gold" id="s-remain">0</div>
            <div class="sl">Remaining</div>
        </div>
        <div class="st">
            <div class="sn red" id="s-skip">0</div>
            <div class="sl">Skipped</div>
        </div>
        <div class="st">
            <div class="sn" id="s-pct">0%</div>
            <div class="sl">Complete</div>
        </div>
    </div>
    <div class="pbar">
        <div class="pfill" id="pf" style="width:0%"></div>
    </div>
    <div class="dirty-bar" id="dirty">
        <p>You have unsaved changes</p>
        <button onclick="saveAll()">Save changes</button>
    </div>
    <div class="ctrls">
        <button class="fb on" data-cat="all">All</button>
        <button class="fb" data-cat="tv">TV shows</button>
        <button class="fb" data-cat="movie">Movies</button>
        <button class="fb" data-cat="anime-movie">Anime films</button>
        <button class="fb" data-cat="anime-tv">Anime TV</button>
        <div class="sw">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/>
                <path d="m21 21-4.3-4.3"/>
            </svg>
            <input type="text" id="search" placeholder="Search..."></div>
    </div>
    <div class="vrow">
        <button class="vb on" data-view="all">All</button>
        <button class="vb" data-view="unwatched">Unwatched</button>
        <button class="vb" data-view="watched">Watched</button>
        <button class="vb" data-view="skipped">Skipped</button>
    </div>
    <div id="list">
        <div class="loading">Loading watchlist data...</div>
    </div>
    <div class="tb">
        <button class="tbtn" onclick="saveAll()">Save changes (download JSON)</button>
        <button class="tbtn dng" onclick="resetAll()">Reset all progress</button>
    </div>
</div>
<div class="pp" id="poster"><img id="pimg" src="" alt="">
    <div class="pt" id="ptitle"></div>
</div>
<div class="toast" id="toast"></div>
<script src="javascript/app.js" defer></script>
</body>
</html>
