<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watchlist Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c0f;--bg-card:#16161b;--bg-hover:#1c1c23;--bg-surface:#1e1e26;--text:#e8e6e1;--text-muted:#8a8780;--text-dim:#5a5853;--gold:#d4a843;--gold-dim:rgba(212,168,67,.15);--green:#4ade80;--green-dim:rgba(74,222,128,.12);--red:#f87171;--red-dim:rgba(248,113,113,.12);--blue:#60a5fa;--blue-dim:rgba(96,165,250,.12);--border:rgba(255,255,255,.06);--border-h:rgba(255,255,255,.12);--r:10px;--f:'DM Sans',sans-serif;--fd:'Playfair Display',serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--f);min-height:100vh;line-height:1.5}
.grain{position:fixed;inset:0;pointer-events:none;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}
.c{max-width:860px;margin:0 auto;padding:2rem 1.25rem 4rem}
header{text-align:center;margin-bottom:2.5rem;padding-bottom:2rem;border-bottom:1px solid var(--border)}
header h1{font-family:var(--fd);font-size:clamp(1.8rem,5vw,2.6rem);font-weight:700;letter-spacing:-.5px;margin-bottom:.4rem}
header h1 span{color:var(--gold)}
header p{font-size:.82rem;color:var(--text-muted);max-width:520px;margin:0 auto}
header p code{background:var(--bg-surface);padding:1px 6px;border-radius:4px;font-size:.78rem}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(95px,1fr));gap:10px;margin-bottom:1.5rem}
.st{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;text-align:center}
.sn{font-size:1.3rem;font-weight:600;font-variant-numeric:tabular-nums}
.sn.gold{color:var(--gold)}.sn.green{color:var(--green)}.sn.red{color:var(--red)}
.sl{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
.pbar{width:100%;height:6px;background:var(--bg-surface);border-radius:3px;margin-bottom:1.5rem;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--gold),#e8c36a);border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.dirty-bar{display:none;align-items:center;gap:10px;padding:10px 16px;margin-bottom:1.5rem;border-radius:var(--r);background:var(--blue-dim);border:1px solid rgba(96,165,250,.25)}
.dirty-bar.show{display:flex}
.dirty-bar p{font-size:.8rem;color:var(--blue);flex:1}
.dirty-bar button{font-family:var(--f);font-size:.76rem;padding:7px 18px;border-radius:100px;border:1px solid var(--blue);background:rgba(96,165,250,.15);color:var(--blue);cursor:pointer;font-weight:500;transition:all .15s;white-space:nowrap}
.dirty-bar button:hover{background:rgba(96,165,250,.25)}
.ctrls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem;align-items:center}
.fb,.vb{font-family:var(--f);font-size:.76rem;padding:7px 15px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all .2s}
.fb:hover,.vb:hover{border-color:var(--border-h);color:var(--text)}
.fb.on{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}
.vb.on{background:var(--bg-surface);color:var(--text);border-color:var(--border-h)}
.sw{margin-left:auto;position:relative}
.sw input{font-family:var(--f);font-size:.8rem;padding:7px 14px 7px 32px;border-radius:100px;border:1px solid var(--border);background:var(--bg-card);color:var(--text);width:180px;outline:none;transition:border-color .2s}
.sw input:focus{border-color:var(--gold)}.sw input::placeholder{color:var(--text-dim)}
.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--text-dim)}
.vrow{display:flex;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap}
.sec{font-family:var(--fd);font-size:1.15rem;font-weight:600;margin:2rem 0 .75rem;display:flex;align-items:center;gap:10px}
.sec .b{font-family:var(--f);font-size:.63rem;background:var(--gold-dim);color:var(--gold);padding:3px 10px;border-radius:100px;font-weight:500}
.tier{font-size:.68rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin:1.2rem 0 .5rem;padding-left:4px}
.item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r);border:1px solid transparent;cursor:default;transition:all .15s;margin-bottom:2px;position:relative}
.item:hover{background:var(--bg-card);border-color:var(--border)}
.item.w{opacity:.4}.item.w:hover{opacity:.6}
.item.ig{opacity:.35}.item.ig:hover{opacity:.5}
.cb{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--text-dim);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .2s}
.item:hover .cb{border-color:var(--text-muted)}
.item.w .cb{background:var(--green);border-color:var(--green)}
.cb svg{width:12px;height:12px;opacity:0;transition:opacity .15s}
.item.w .cb svg{opacity:1}
.rt{font-size:.76rem;font-weight:600;min-width:32px;text-align:center;flex-shrink:0;font-variant-numeric:tabular-nums}
.re{color:#fbbf24}.rg{color:#a3a3a3}.rb{color:#a78bfa}
.tt{font-size:.85rem;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.yp{font-size:.66rem;color:var(--text-dim);background:var(--bg-surface);padding:2px 7px;border-radius:4px;flex-shrink:0}
.mt{font-size:.7rem;color:var(--text-dim);flex-shrink:0;text-align:right;max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb{opacity:0;font-family:var(--f);font-size:.63rem;padding:3px 10px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all .15s;flex-shrink:0;white-space:nowrap}
.item:hover .sb{opacity:1}
.sb:hover{border-color:var(--red);color:var(--red);background:var(--red-dim)}
.rb2{font-family:var(--f);font-size:.63rem;padding:3px 10px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--green);cursor:pointer;transition:all .15s;flex-shrink:0;opacity:0;white-space:nowrap}
.item:hover .rb2{opacity:1}
.rb2:hover{background:var(--green-dim);border-color:var(--green)}
.pp{position:fixed;z-index:1000;pointer-events:none;width:154px;border-radius:8px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.7);border:1px solid var(--border-h);opacity:0;transition:opacity .2s;background:var(--bg-card)}
.pp.vis{opacity:1}
.pp img{width:100%;display:block;min-height:210px;object-fit:cover;background:var(--bg-surface)}
.pp .pt{padding:7px 10px;font-size:.7rem;color:var(--text-muted);text-align:center;border-top:1px solid var(--border)}
.tb{display:flex;gap:8px;margin-top:2.5rem;padding-top:1.5rem;border-top:1px solid var(--border);flex-wrap:wrap}
.tbtn{font-family:var(--f);font-size:.73rem;padding:8px 16px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg-card);color:var(--text-muted);cursor:pointer;transition:all .2s}
.tbtn:hover{border-color:var(--border-h);color:var(--text)}.tbtn.dng:hover{border-color:var(--red);color:var(--red)}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg-card);border:1px solid var(--border-h);color:var(--text);padding:10px 24px;border-radius:100px;font-size:.8rem;opacity:0;transition:all .35s cubic-bezier(.4,0,.2,1);z-index:100;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.err{text-align:center;padding:3rem;color:var(--red);font-size:.9rem}
.loading{text-align:center;padding:3rem;color:var(--text-dim);font-size:.85rem}
@media(max-width:600px){.mt{display:none}.sw input{width:130px}.sb,.rb2{opacity:1!important;padding:4px 8px}}
</style>
</head>
<body>
<div class="grain"></div>
<div class="c">
<header>
<h1>Watchlist <span>Tracker</span></h1>
<p>Fork this repo, tick what you've watched, then <code>Save changes</code> and commit the updated JSON files. Hover titles for poster previews.</p>
</header>
<div class="stats">
<div class="st"><div class="sn" id="s-total">0</div><div class="sl">Total</div></div>
<div class="st"><div class="sn green" id="s-watched">0</div><div class="sl">Watched</div></div>
<div class="st"><div class="sn gold" id="s-remain">0</div><div class="sl">Remaining</div></div>
<div class="st"><div class="sn red" id="s-skip">0</div><div class="sl">Skipped</div></div>
<div class="st"><div class="sn" id="s-pct">0%</div><div class="sl">Complete</div></div>
</div>
<div class="pbar"><div class="pfill" id="pf" style="width:0%"></div></div>
<div class="dirty-bar" id="dirty">
<p>You have unsaved changes</p>
<button onclick="saveAll()">Save changes</button>
</div>
<div class="ctrls">
<button class="fb on" data-cat="all">All</button>
<button class="fb" data-cat="tv">TV shows</button>
<button class="fb" data-cat="movie">Movies</button>
<button class="fb" data-cat="anime-movie">Anime films</button>
<button class="fb" data-cat="anime-tv">Anime TV</button>
<div class="sw"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><input type="text" id="search" placeholder="Search..."></div>
</div>
<div class="vrow">
<button class="vb on" data-view="all">All</button>
<button class="vb" data-view="unwatched">Unwatched</button>
<button class="vb" data-view="watched">Watched</button>
<button class="vb" data-view="skipped">Skipped</button>
</div>
<div id="list"><div class="loading">Loading watchlist data...</div></div>
<div class="tb">
<button class="tbtn" onclick="saveAll()">Save changes (download JSON)</button>
<button class="tbtn dng" onclick="resetAll()">Reset all progress</button>
</div>
</div>
<div class="pp" id="poster"><img id="pimg" src="" alt=""><div class="pt" id="ptitle"></div></div>
<div class="toast" id="toast"></div>
<script>
let toWatch=[],watchedList=[],skippedList=[];
let dirty=false,activeCat="all",activeView="all",searchQ="";
const posterCache={};
const SM={tv:"TV shows",movie:"Movies","anime-movie":"Anime films","anime-tv":"Anime TV shows"};
const TR=[{min:9,l:"9.0+ — Elite"},{min:8.7,l:"8.7–8.9 — Outstanding"},{min:8.5,l:"8.5–8.6 — Excellent"},{min:8.1,l:"8.1–8.4 — Great"}];

async function init(){
  try{
    const [tw,w,s]=await Promise.all([
      fetch("to-watch.json").then(r=>r.json()),
      fetch("watched.json").then(r=>r.json()),
      fetch("skipped.json").then(r=>r.json())
    ]);
    toWatch=tw; watchedList=w; skippedList=s;
    render();
  }catch(e){
    document.getElementById("list").innerHTML=`<div class="err">Failed to load JSON files. Make sure <code>to-watch.json</code>, <code>watched.json</code>, and <code>skipped.json</code> are in the same directory.<br><br><small>${e.message}</small></div>`;
  }
}

function allItems(){return[...toWatch,...watchedList,...skippedList]}
function findAndRemove(id){
  let item;
  let i=toWatch.findIndex(x=>x.id===id);if(i>=0){item=toWatch.splice(i,1)[0];return item}
  i=watchedList.findIndex(x=>x.id===id);if(i>=0){item=watchedList.splice(i,1)[0];return item}
  i=skippedList.findIndex(x=>x.id===id);if(i>=0){item=skippedList.splice(i,1)[0];return item}
  return null;
}

function markWatched(id){
  const item=findAndRemove(id);if(!item)return;
  watchedList.push(item);
  watchedList.sort((a,b)=>b.rating-a.rating);
  setDirty();render();
}
function unwatch(id){
  const item=findAndRemove(id);if(!item)return;
  toWatch.push(item);
  toWatch.sort((a,b)=>b.rating-a.rating);
  setDirty();render();
}
function skip(id){
  const item=findAndRemove(id);if(!item)return;
  skippedList.push(item);
  skippedList.sort((a,b)=>b.rating-a.rating);
  setDirty();render();
}
function restore(id){
  const item=findAndRemove(id);if(!item)return;
  toWatch.push(item);
  toWatch.sort((a,b)=>b.rating-a.rating);
  setDirty();render();
}

function setDirty(){dirty=true;document.getElementById("dirty").classList.add("show")}

function downloadJSON(data,filename){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=filename;a.click();URL.revokeObjectURL(a.href);
}
function saveAll(){
  downloadJSON(toWatch,"to-watch.json");
  setTimeout(()=>downloadJSON(watchedList,"watched.json"),300);
  setTimeout(()=>downloadJSON(skippedList,"skipped.json"),600);
  dirty=false;document.getElementById("dirty").classList.remove("show");
  toast("All 3 JSON files downloaded — commit them to your repo!");
}
function resetAll(){
  if(!confirm("Reset all progress? This moves everything back to to-watch."))return;
  toWatch=[...allItems()].sort((a,b)=>b.rating-a.rating);
  watchedList=[];skippedList=[];
  setDirty();render();toast("Progress reset");
}

function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),3000)}

function getTier(r){for(const t of TR)if(r>=t.min)return t.l;return"Other"}
function rc(r){return r>=9?"re":r>=8.5?"rg":"rb"}

async function fetchPoster(title,year,cat){
  const k=title+year;if(posterCache[k])return posterCache[k];if(posterCache[k]===null)return null;
  try{
    const t=cat.includes("anime")||cat.includes("tv")?"series":"movie";
    const clean=title.replace(/\s*\(S\d+\)|\s*\(.*?\)$/g,"").replace(/:.*/,"").trim();
    const r=await fetch(`https://www.omdbapi.com/?t=${encodeURIComponent(clean)}&y=${year}&type=${t==="series"?"series":"movie"}&apikey=4a3b711b`);
    const d=await r.json();
    if(d.Poster&&d.Poster!=="N/A"){posterCache[k]=d.Poster;return d.Poster}
    const r2=await fetch(`https://www.omdbapi.com/?t=${encodeURIComponent(clean)}&type=${t==="series"?"series":"movie"}&apikey=4a3b711b`);
    const d2=await r2.json();
    if(d2.Poster&&d2.Poster!=="N/A"){posterCache[k]=d2.Poster;return d2.Poster}
    posterCache[k]=null;return null;
  }catch{posterCache[k]=null;return null}
}

const pp=document.getElementById("poster"),pimg=document.getElementById("pimg"),ptitle=document.getElementById("ptitle");
let ht=null;
window._showP=function(e,id){
  clearTimeout(ht);
  const item=allItems().find(x=>x.id===id);if(!item)return;
  ht=setTimeout(async()=>{
    const url=await fetchPoster(item.title,item.year,item.category);
    pimg.src=url||"";ptitle.textContent=item.title+" ("+item.year+")";
    pp.classList.add("vis");posP(e);
  },300);
};
window._moveP=function(e){posP(e)};
window._hideP=function(){clearTimeout(ht);pp.classList.remove("vis")};
function posP(e){
  let x=e.clientX+20,y=e.clientY-60;
  if(x+160>window.innerWidth)x=e.clientX-180;
  if(y+280>window.innerHeight)y=window.innerHeight-290;
  if(y<10)y=10;
  pp.style.left=x+"px";pp.style.top=y+"px";
}

function renderRow(item,listType){
  const isW=listType==="watched";
  const isSk=listType==="skipped";
  const cls=isW?"item w":isSk?"item ig":"item";
  let actions="";
  if(listType==="towatch"){
    actions=`<button class="cb" onclick="event.stopPropagation();markWatched('${item.id}')"><svg viewBox="0 0 14 14" fill="none"><path d="M2.5 7.5L5.5 10.5L11.5 3.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>`;
    actions+=`<button class="sb" onclick="event.stopPropagation();skip('${item.id}')">Skip</button>`;
  }else if(isW){
    actions=`<div class="cb" onclick="event.stopPropagation();unwatch('${item.id}')" style="background:var(--green);border-color:var(--green)"><svg viewBox="0 0 14 14" fill="none" style="opacity:1"><path d="M2.5 7.5L5.5 10.5L11.5 3.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;
  }else if(isSk){
    actions=`<button class="rb2" onclick="event.stopPropagation();restore('${item.id}')">Restore</button>`;
  }
  return `<div class="${cls}" onmouseenter="_showP(event,'${item.id}')" onmousemove="_moveP(event)" onmouseleave="_hideP()">
  ${actions}
  <span class="rt ${rc(item.rating)}">${item.rating.toFixed(1)}</span>
  <span class="tt">${item.title}</span>
  <span class="yp">${item.year}</span>
  <span class="mt">${item.meta}</span>
  </div>`;
}

function render(){
  const all=allItems();
  const activeCount=toWatch.length+watchedList.length;
  const wc=watchedList.length;
  document.getElementById("s-total").textContent=all.length;
  document.getElementById("s-watched").textContent=wc;
  document.getElementById("s-remain").textContent=toWatch.length;
  document.getElementById("s-skip").textContent=skippedList.length;
  const pct=activeCount?Math.round(wc/activeCount*100):0;
  document.getElementById("s-pct").textContent=pct+"%";
  document.getElementById("pf").style.width=pct+"%";

  let source;
  if(activeView==="watched")source=watchedList.map(i=>({item:i,type:"watched"}));
  else if(activeView==="skipped")source=skippedList.map(i=>({item:i,type:"skipped"}));
  else if(activeView==="unwatched")source=toWatch.map(i=>({item:i,type:"towatch"}));
  else source=[...toWatch.map(i=>({item:i,type:"towatch"})),...watchedList.map(i=>({item:i,type:"watched"}))];

  if(activeCat!=="all")source=source.filter(x=>x.item.category===activeCat);
  if(searchQ){const q=searchQ.toLowerCase();source=source.filter(x=>x.item.title.toLowerCase().includes(q)||x.item.meta.toLowerCase().includes(q))}

  source.sort((a,b)=>b.item.rating-a.item.rating);

  const secs=activeCat==="all"?["tv","movie","anime-movie","anime-tv"]:[activeCat];
  let html="";
  for(const sec of secs){
    const secItems=source.filter(x=>x.item.category===sec);
    if(!secItems.length)continue;
    html+=`<div class="sec">${SM[sec]}<span class="b">${secItems.length}</span></div>`;
    if(activeView!=="skipped"){
      const tiers={};secItems.forEach(x=>{const t=getTier(x.item.rating);if(!tiers[t])tiers[t]=[];tiers[t].push(x)});
      for(const tr of TR){const g=tiers[tr.l];if(!g)continue;html+=`<div class="tier">${tr.l}</div>`;g.forEach(x=>{html+=renderRow(x.item,x.type)})}
    }else{
      secItems.forEach(x=>{html+=renderRow(x.item,x.type)});
    }
  }
  if(!html)html=`<div style="text-align:center;padding:3rem;color:var(--text-dim)">${activeView==="skipped"?"No skipped entries":"No entries match"}</div>`;
  document.getElementById("list").innerHTML=html;
}

document.querySelectorAll(".fb").forEach(b=>{b.addEventListener("click",()=>{activeCat=b.dataset.cat;document.querySelectorAll(".fb").forEach(x=>x.classList.toggle("on",x===b));render()})});
document.querySelectorAll(".vb").forEach(b=>{b.addEventListener("click",()=>{activeView=b.dataset.view;document.querySelectorAll(".vb").forEach(x=>x.classList.toggle("on",x===b));render()})});
document.getElementById("search").addEventListener("input",e=>{searchQ=e.target.value;render()});
window.addEventListener("beforeunload",e=>{if(dirty){e.preventDefault();e.returnValue=""}});
init();
</script>
</body>
</html>
